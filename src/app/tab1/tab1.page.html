<ion-header>
  <ion-toolbar>
    <ion-title>Lista Pokémon</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-list>
    <ion-item *ngFor="let p of pokemons; let i = index">
      <ion-label>{{ p.name }}</ion-label>

      <img
        [src]="'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/' + (i+1) + '.png'"
        width="50"
      />
    </ion-item>
  </ion-list>

</ion-content>
