<ion-header>
  <ion-toolbar>
    <ion-title>Buscar Pokémon</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-item>
    <ion-input [(ngModel)]="nome" placeholder="Digite o nome"></ion-input>
  </ion-item>

  <ion-button expand="full" (click)="buscar()">
    Buscar
  </ion-button>

  <div *ngIf="pokemon">
    <h2>{{ pokemon.name }}</h2>
    <img [src]="pokemon.sprites.front_default" />
  </div>

</ion-content>
